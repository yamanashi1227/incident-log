<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ── Excel全シート→テキスト変換 ──
    async function excelToText(file) {
      const XL = window.XLSX;
      const buf = await file.arrayBuffer();
      const wb  = XL.read(buf, { type: "array", cellDates: true });

      const TARGET = ["一覧", "一覧_2024", "一覧_2024時系列", "エラー詳細", "エラー詳細_2024"];
      const sections = [];

      for (const sn of TARGET) {
        if (!wb.SheetNames.includes(sn)) continue;
        const ws   = wb.Sheets[sn];
        const rows = XL.utils.sheet_to_json(ws, { header: 1, defval: "", raw: false });

        const hIdx = rows.findIndex(r =>
          r.some(c => ["ID","Summary","Location","Date","Service Impact"].includes(String(c).trim()))
        );
        if (hIdx < 0) continue;

        const allHeaders = rows[hIdx].map(h => String(h).trim());
        const dataRows = [];

        for (let i = hIdx + 1; i < rows.length; i++) {
          const row = rows[i];
          const idVal = String(row[0] ?? "").trim().replace(/\.0$/, "");
          if (!idVal.match(/^\d+$/)) continue;
          const filled = row.filter(c => String(c).trim()).length;
          if (filled < 2) continue;
          const obj = {};
          allHeaders.forEach((h, j) => {
            const v = String(row[j] ?? "").trim();
            if (v && h) obj[h] = v.slice(0, 200);
          });
          dataRows.push(obj);
        }
        if (dataRows.length === 0) continue;

        const useCols = allHeaders.slice(0, 8).filter(Boolean);
        const csv = [
          useCols.join(" | "),
          ...dataRows.map(r => useCols.map(c => (r[c] || "").replace(/\n/g, "／")).join(" | "))
        ].join("\n");

        sections.push(`=== シート: ${sn} (${dataRows.length}件) ===\n${csv}`);
      }

      return { text: sections.join("\n\n"), sheetInfo: sections.map(s => {
        const m = s.match(/=== シート: (.+?) \((\d+)件\)/);
        return m ? { name: m[1], count: parseInt(m[2]) } : null;
      }).filter(Boolean) };
    }

    // ── Claude API (ストリーミング) ──
    async function callClaude(messages, system, apiKey, onChunk) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4096,
          stream: true,
          system,
          messages,
        }),
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(`API ${res.status}: ${t.slice(0,300)}`);
      }
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") return;
          try {
            const j = JSON.parse(data);
            if (j.type === "content_block_delta" && j.delta?.text) onChunk(j.delta.text);
          } catch {}
        }
      }
    }

    // ── SYSTEM PROMPT ──
    const SYSTEM = `あなたはi-Reporterクラウド環境の障害対応支援AIです。
ユーザーが「今まさに起きている障害の状況」を入力したら、過去の対応ログを根拠に「今すぐやるべき手順」だけを返してください。

【この環境の標準対応手順（必ずこれをベースにすること）】
1. Icinga2でアラートを確認する
2. VMにログインし、タスクマネージャー・リソースモニターで負荷の原因を確認する
3. IIS起因の場合 → IISのアプリケーションプールをリサイクルする
4. PostgreSQL起因の場合 → pgAdminを開き、ダッシュボードでスロークエリを確認してキャンセルする

【回答フォーマット — 必ずこの構成で、短く返すこと】

**類似事例**
過去ログから最も近い事例を1〜3件（シート名・ID・日付・概要を1行で）

**今すぐやること**
1. Icinga2でアラート内容を確認する
2. VMにログインし、タスクマネージャー・リソースモニターで原因（IIS or PostgreSQL）を特定する
3. （IIS起因なら）IISアプリケーションプールをリサイクルする
   （PostgreSQL起因なら）pgAdminのダッシュボードでスロークエリを確認してキャンセルする
4. 過去ログに応じた追加対応があれば記載する
5. 解消を確認する

**注意**
過去ログで「再発した」「静観では解消しなかった」など失敗パターンがあれば1行だけ補足。なければ省略。

【厳守ルール】
- 原因分析・改善提案・長文の考察は一切書かない
- 手順は「〜する」の命令形で簡潔に
- 根拠は必ず (シート名 #ID, 日付) の形で示す
- 回答全体を500字以内に収める
- 過去ログに該当なければ「類似事例なし」と返す`;

    // ── プリセット質問 ──
    const PRESETS = [
      { icon:"🔴", label:"メモリ高負荷が発生",     q:"今メモリ高負荷アラートが出ています。過去ログを元に今すぐやるべき対応手順を教えてください。" },
      { icon:"🟠", label:"CPU高負荷が発生",         q:"今CPU高負荷アラートが出ています。過去ログを元に今すぐやるべき対応手順を教えてください。" },
      { icon:"🟡", label:"スロークエリを検知",      q:"スロークエリを検知しました。クラスタ値検索が原因の可能性があります。過去ログを元に今すぐやるべき対応手順を教えてください。" },
      { icon:"🔵", label:"DBコネクション数が高騰",  q:"PostgreSQLのコネクション数が高騰しています。過去ログを元に今すぐやるべき対応手順を教えてください。" },
      { icon:"⚪", label:"データ出力で応答が遅い",  q:"ConMasManagerのデータ出力が遅いと顧客から連絡がありました。過去ログを元に今すぐやるべき対応手順を教えてください。" },
    ];

    // ── スタイル定数 ──
    const BG  = "#0c1117";
    const S1  = "#111827";
    const S2  = "rgba(255,255,255,0.03)";
    const BDR = "rgba(255,255,255,0.08)";
    const ACC = "#38bdf8";
    const OK  = "#4ade80";
    const FONT = "'Noto Sans JP','Hiragino Sans',sans-serif";
    const MONO = "'JetBrains Mono', monospace";

    // ── APIキー設定画面 ──
    function SetupScreen({ onSave }) {
      const [key, setKey] = useState("");
      const [show, setShow] = useState(false);
      const [err, setErr] = useState("");

      const handleSave = () => {
        const trimmed = key.trim();
        if (!trimmed.startsWith("sk-ant-")) {
          setErr("APIキーは「sk-ant-」から始まる必要があります");
          return;
        }
        onSave(trimmed);
      };

      return (
        <div className="fade-in" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:32 }}>
          <div style={{ maxWidth:480, width:"100%" }}>
            <div style={{ textAlign:"center", marginBottom:32 }}>
              <div style={{ fontSize:48, marginBottom:12 }}>🔑</div>
              <h2 style={{ color:"#f1f5f9", fontSize:20, fontWeight:700, marginBottom:8 }}>
                Anthropic APIキーを設定
              </h2>
              <p style={{ color:"#4b5563", fontSize:13, lineHeight:1.7 }}>
                キーはこのブラウザのメモリにのみ保存され、<br/>
                外部には送信されません（Anthropic APIへの通信を除く）
              </p>
            </div>

            <div style={{ background:S1, border:`1px solid ${BDR}`, borderRadius:12, padding:24, marginBottom:16 }}>
              <label style={{ display:"block", color:"#94a3b8", fontSize:11, fontWeight:600,
                letterSpacing:"0.08em", marginBottom:8, textTransform:"uppercase" }}>
                API Key
              </label>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type={show ? "text" : "password"}
                  value={key}
                  onChange={e => { setKey(e.target.value); setErr(""); }}
                  onKeyDown={e => e.key === "Enter" && handleSave()}
                  placeholder="sk-ant-api03-..."
                  style={{ flex:1, background:"rgba(0,0,0,0.3)", border:`1px solid ${BDR}`,
                    borderRadius:7, padding:"11px 14px", color:"#e2e8f0", fontSize:13,
                    fontFamily:MONO, outline:"none" }}
                />
                <button onClick={() => setShow(s => !s)} style={{
                  background:S2, border:`1px solid ${BDR}`, borderRadius:7,
                  color:"#4b5563", cursor:"pointer", padding:"0 12px", fontSize:16 }}>
                  {show ? "🙈" : "👁"}
                </button>
              </div>
              {err && (
                <div style={{ color:"#f87171", fontSize:12, marginTop:8 }}>{err}</div>
              )}
            </div>

            <button onClick={handleSave} disabled={!key.trim()} style={{
              width:"100%", background: key.trim()
                ? `linear-gradient(135deg, ${ACC}, #0ea5e9)`
                : S2,
              border:"none", borderRadius:8, padding:"13px",
              color: key.trim() ? "#fff" : "#2d3748",
              fontWeight:700, fontSize:14, cursor: key.trim() ? "pointer" : "not-allowed",
              fontFamily:FONT, letterSpacing:"0.02em",
              transition:"all .2s",
            }}>
              設定して開始 →
            </button>

            <div style={{ marginTop:16, background:"rgba(56,189,248,0.05)",
              border:`1px solid ${ACC}20`, borderRadius:8, padding:"12px 16px" }}>
              <div style={{ color:"#64748b", fontSize:11, lineHeight:1.7 }}>
                💡 <strong style={{ color:"#38bdf8" }}>APIキーの取得:</strong>{" "}
                <a href="https://console.anthropic.com/settings/keys" target="_blank"
                  style={{ color:ACC, textDecoration:"none" }}>
                  console.anthropic.com
                </a> で発行できます
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── メインアプリ ──
    function App() {
      const [apiKey, setApiKey]     = useState("");
      const [phase, setPhase]       = useState("setup");
      const [loading, setLoading]   = useState(false);
      const [loadMsg, setLoadMsg]   = useState("");
      const [fileInfo, setFileInfo] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput]       = useState("");
      const [streaming, setStreaming] = useState(false);
      const [err, setErr]           = useState("");
      const fileRef  = useRef();
      const bottomRef= useRef();
      const dataText = useRef("");

      const handleApiKey = (key) => {
        setApiKey(key);
        setPhase("import");
      };

      // ── インポート処理 ──
      const handleFile = useCallback(async (file) => {
        if (!file) return;
        setErr(""); setLoading(true); setLoadMsg("SheetJSを読み込み中...");
        try {
          setLoadMsg("Excelを解析中...");
          const { text, sheetInfo } = await excelToText(file);
          if (!text.trim()) throw new Error("有効なデータが見つかりませんでした");
          dataText.current = text;
          const total = sheetInfo.reduce((s, x) => s + x.count, 0);
          setFileInfo({ name: file.name, sheets: sheetInfo, total });
          setPhase("ready");
        } catch(e) {
          setErr("❌ " + e.message);
        } finally {
          setLoading(false); setLoadMsg("");
        }
      }, []);

      const onDrop = useCallback((e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files?.[0]);
      }, [handleFile]);

      // ── メッセージ送信 ──
      const send = useCallback(async (text) => {
        if (!text.trim() || streaming) return;
        setErr(""); setStreaming(true);
        setInput("");

        const userMsg = { role:"user", content: text };
        setMessages(prev => [...prev, userMsg, { role:"assistant", content:"", streaming:true }]);
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior:"smooth" }), 50);

        const history = messages;
        let apiMsgs;
        if (history.length === 0) {
          apiMsgs = [
            { role:"user", content: `以下は「${fileInfo.name}」からインポートした障害対応記録データです。\n\n${dataText.current}\n\n---\n${text}` }
          ];
        } else {
          const rebuilt = history.map((m, i) => {
            if (i === 0 && m.role === "user") {
              return { role:"user", content: `以下は「${fileInfo.name}」からインポートした障害対応記録データです。\n\n${dataText.current}\n\n---\n${m.content}` };
            }
            return { role: m.role, content: m.content };
          });
          apiMsgs = [...rebuilt, { role:"user", content: text }];
        }

        let full = "";
        try {
          await callClaude(apiMsgs, SYSTEM, apiKey, chunk => {
            full += chunk;
            setMessages(prev => {
              const next = [...prev];
              next[next.length-1] = { role:"assistant", content:full, streaming:true };
              return next;
            });
            bottomRef.current?.scrollIntoView({ behavior:"smooth" });
          });
        } catch(e) {
          setErr("⚠️ " + e.message);
        }

        setMessages(prev => {
          const next = [...prev];
          next[next.length-1] = { role:"assistant", content: full || "（応答なし）", streaming:false };
          return next;
        });
        setStreaming(false);
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior:"smooth" }), 100);
      }, [messages, streaming, fileInfo, apiKey]);

      const startChat = (preset = "") => {
        setPhase("chat");
        if (preset) setTimeout(() => send(preset), 100);
      };

      return (
        <div style={{ minHeight:"100vh", background:BG, color:"#e2e8f0",
          fontFamily:FONT, display:"flex", flexDirection:"column" }}>

          {/* ── HEADER ── */}
          <div style={{ borderBottom:`1px solid ${BDR}`, padding:"11px 22px",
            display:"flex", alignItems:"center", gap:12,
            background:"rgba(0,0,0,0.5)", backdropFilter:"blur(10px)",
            position:"sticky", top:0, zIndex:50 }}>
            <div style={{ width:28, height:28, borderRadius:6,
              background:"linear-gradient(135deg,#f87171,#fb923c)",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>⚡</div>
            <div>
              <div style={{ fontWeight:700, fontSize:13, color:"#fff" }}>障害対応支援システム</div>
              <div style={{ fontSize:10, color:"#374151" }}>i-Reporter Cloud · Claude AI Analyzer</div>
            </div>

            <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
              {apiKey && phase !== "setup" && (
                <div style={{ background:`${ACC}12`, border:`1px solid ${ACC}30`,
                  borderRadius:4, padding:"3px 10px", fontSize:10,
                  color:ACC, fontFamily:MONO }}>
                  🔑 sk-ant-···{apiKey.slice(-6)}
                </div>
              )}
              {fileInfo && (
                <>
                  <div style={{ background:`${OK}12`, border:`1px solid ${OK}35`,
                    borderRadius:4, padding:"3px 10px", fontSize:11, color:OK }}>
                    ✓ {fileInfo.name.length > 28 ? fileInfo.name.slice(0,28)+"…" : fileInfo.name} · {fileInfo.total}件
                  </div>
                  <button onClick={() => { setPhase("import"); setFileInfo(null); setMessages([]); dataText.current=""; }}
                    style={{ background:"none", border:`1px solid ${BDR}`, borderRadius:4,
                      color:"#4b5563", padding:"3px 10px", cursor:"pointer", fontSize:11 }}>
                    再読込
                  </button>
                </>
              )}
              {phase !== "setup" && (
                <button onClick={() => { setPhase("setup"); setApiKey(""); setFileInfo(null); setMessages([]); dataText.current=""; }}
                  style={{ background:"none", border:`1px solid ${BDR}`, borderRadius:4,
                    color:"#374151", padding:"3px 10px", cursor:"pointer", fontSize:10 }}>
                  🔑 変更
                </button>
              )}
            </div>
          </div>

          {/* ── SETUP ── */}
          {phase === "setup" && <SetupScreen onSave={handleApiKey} />}

          {/* ── IMPORT ── */}
          {phase === "import" && (
            <div className="fade-in" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:32 }}>
              <div style={{ maxWidth:500, width:"100%" }}>
                <div style={{ textAlign:"center", marginBottom:28 }}>
                  <div style={{ fontSize:44, marginBottom:10 }}>📊</div>
                  <h1 style={{ margin:"0 0 8px", fontSize:20, fontWeight:700, color:"#f1f5f9" }}>
                    障害記録 Excel をインポート
                  </h1>
                  <p style={{ margin:0, color:"#4b5563", fontSize:13 }}>
                    読み込み後、Claude AI が全シートを横断分析します
                  </p>
                </div>

                <div onDrop={onDrop} onDragOver={e=>e.preventDefault()}
                  onClick={() => fileRef.current?.click()}
                  style={{ border:`2px dashed ${BDR}`, borderRadius:12, padding:"48px 24px",
                    textAlign:"center", cursor:"pointer", background:S2, marginBottom:14,
                    transition:"all .2s" }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor=ACC+"88"; e.currentTarget.style.background="rgba(56,189,248,0.04)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor=BDR; e.currentTarget.style.background=S2; }}
                >
                  {loading
                    ? <div><div style={{ fontSize:28, marginBottom:8 }}>⏳</div><div style={{ color:ACC, fontSize:13 }}>{loadMsg}</div></div>
                    : <div>
                        <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
                        <div style={{ color:"#cbd5e1", fontWeight:600, marginBottom:4 }}>クリックまたはドラッグ＆ドロップ</div>
                        <div style={{ color:"#374151", fontSize:12 }}>.xlsx / .xls</div>
                      </div>
                  }
                  <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }}
                    onChange={e => handleFile(e.target.files?.[0])} />
                </div>

                {err && (
                  <div style={{ background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.2)",
                    borderRadius:6, padding:"10px 14px", color:"#f87171", fontSize:12, marginBottom:10 }}>
                    {err}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── READY ── */}
          {phase === "ready" && fileInfo && (
            <div className="fade-in" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:32 }}>
              <div style={{ maxWidth:580, width:"100%" }}>
                <div style={{ background:`${OK}0c`, border:`1px solid ${OK}30`,
                  borderRadius:10, padding:"14px 18px", marginBottom:22,
                  display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ fontSize:26 }}>✅</div>
                  <div>
                    <div style={{ color:OK, fontWeight:700 }}>インポート完了</div>
                    <div style={{ color:"#4b5563", fontSize:11, marginTop:2 }}>{fileInfo.name}</div>
                  </div>
                  <div style={{ marginLeft:"auto", display:"flex", gap:16 }}>
                    {fileInfo.sheets.map(s => (
                      <div key={s.name} style={{ textAlign:"center" }}>
                        <div style={{ color:ACC, fontSize:17, fontWeight:700, fontFamily:MONO }}>{s.count}</div>
                        <div style={{ color:"#374151", fontSize:9 }}>{s.name.slice(0,6)}</div>
                      </div>
                    ))}
                    <div style={{ textAlign:"center", borderLeft:`1px solid ${BDR}`, paddingLeft:12 }}>
                      <div style={{ color:"#f1f5f9", fontSize:17, fontWeight:700, fontFamily:MONO }}>{fileInfo.total}</div>
                      <div style={{ color:"#374151", fontSize:9 }}>合計</div>
                    </div>
                  </div>
                </div>

                <div style={{ color:"#374151", fontSize:11, marginBottom:10 }}>クリックで即座に分析開始</div>
                <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:16 }}>
                  {PRESETS.map(p => (
                    <button key={p.label} onClick={() => startChat(p.q)} style={{
                      background:S2, border:`1px solid ${BDR}`, borderRadius:8,
                      padding:"11px 16px", cursor:"pointer", textAlign:"left",
                      color:"#cbd5e1", fontSize:13, fontFamily:FONT,
                      display:"flex", alignItems:"center", gap:10, transition:"all .15s",
                    }}
                    onMouseEnter={e=>{ e.currentTarget.style.background="rgba(56,189,248,0.06)"; e.currentTarget.style.borderColor=ACC+"55"; }}
                    onMouseLeave={e=>{ e.currentTarget.style.background=S2; e.currentTarget.style.borderColor=BDR; }}
                    >
                      <span style={{ fontSize:16 }}>{p.icon}</span>
                      <span>{p.label}</span>
                      <span style={{ marginLeft:"auto", color:"#2d3748" }}>›</span>
                    </button>
                  ))}
                </div>
                <button onClick={() => startChat()} style={{
                  width:"100%", background:`${ACC}12`, border:`1px solid ${ACC}40`,
                  borderRadius:8, padding:"11px", color:ACC, fontWeight:700,
                  fontSize:13, cursor:"pointer", fontFamily:FONT,
                }}>💬 自由に質問する</button>
              </div>
            </div>
          )}

          {/* ── CHAT ── */}
          {phase === "chat" && (
            <div style={{ flex:1, display:"flex", flexDirection:"column",
              maxWidth:820, width:"100%", margin:"0 auto", padding:"0 16px", minHeight:0 }}>

              <div style={{ flex:1, overflowY:"auto", padding:"16px 0" }}>
                {messages.length === 0 && !streaming && (
                  <div className="fade-in" style={{ textAlign:"center", color:"#374151", fontSize:13, marginTop:48 }}>
                    質問を入力してください
                  </div>
                )}
                {messages.map((m, i) => (
                  <div key={i} className="fade-in" style={{ display:"flex", gap:10, marginBottom:18,
                    flexDirection: m.role==="user" ? "row-reverse" : "row" }}>
                    <div style={{ width:30, height:30, borderRadius:7, flexShrink:0,
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:14,
                      background: m.role==="user" ? `${ACC}20` : "rgba(248,113,113,0.18)" }}>
                      {m.role==="user" ? "👤" : "⚡"}
                    </div>
                    <div style={{
                      maxWidth:"80%", background: m.role==="user" ? `${ACC}10` : S1,
                      border:`1px solid ${m.role==="user" ? ACC+"28" : BDR}`,
                      borderRadius: m.role==="user" ? "12px 2px 12px 12px" : "2px 12px 12px 12px",
                      padding:"11px 15px", fontSize:13, lineHeight:1.85,
                      color:"#e2e8f0", whiteSpace:"pre-wrap", wordBreak:"break-word",
                    }}>
                      {m.content}
                      {m.streaming && <span style={{ color:ACC, animation:"blink 1s infinite" }}>▌</span>}
                    </div>
                  </div>
                ))}
                {err && (
                  <div style={{ background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.2)",
                    borderRadius:6, padding:"9px 13px", color:"#f87171", fontSize:12, marginBottom:10 }}>
                    {err}
                  </div>
                )}
                <div ref={bottomRef} />
              </div>

              {/* ショートカット */}
              <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:8 }}>
                {PRESETS.map(p => (
                  <button key={p.label} onClick={() => send(p.q)} disabled={streaming}
                    style={{ background:S2, border:`1px solid ${BDR}`, borderRadius:20,
                      padding:"3px 11px", cursor:streaming?"not-allowed":"pointer",
                      color:streaming?"#2d3748":"#64748b", fontSize:11, fontFamily:FONT }}>
                    {p.icon} {p.label}
                  </button>
                ))}
              </div>

              {/* 入力 */}
              <div style={{ paddingBottom:14, display:"flex", gap:9 }}>
                <textarea value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(input); }}}
                  placeholder="質問を入力… (Enter送信 / Shift+Enterで改行)"
                  style={{ flex:1, background:S2, border:`1px solid ${BDR}`, borderRadius:7,
                    padding:"12px 14px", color:"#e2e8f0", fontSize:13, fontFamily:FONT,
                    outline:"none", resize:"none", height:50, lineHeight:1.5, boxSizing:"border-box" }}
                />
                <button onClick={() => send(input)} disabled={streaming||!input.trim()} style={{
                  background: streaming||!input.trim() ? S2 : `linear-gradient(135deg,${ACC},#0ea5e9)`,
                  border:"none", borderRadius:7, color: streaming||!input.trim() ? "#2d3748" : "#fff",
                  padding:"0 18px", cursor:streaming||!input.trim()?"not-allowed":"pointer",
                  fontWeight:700, fontSize:13, flexShrink:0,
                }}>
                  {streaming ? "⏳" : "送信"}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
